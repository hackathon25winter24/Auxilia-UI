syntax = "proto3";

package game.network;
option csharp_namespace = "Game.Network";
option go_package = "auxilia/pb";

import "google/protobuf/timestamp.proto";

service BattleService {
  // 試合の初期登録
  rpc CreateGame(CreateGameRequest) returns (GameDataResponse);
  
  // 現在の試合情報の取得
  rpc GetGameData(GetGameDataRequest) returns (GameDataResponse);
  rpc RegisterCharacters(RegisterCharactersRequest) returns (RegisterCharactersResponse);
  
  // 対戦中のアクション同期（サーバー・ストリーミング）
  // ルームIDを指定して受信を開始する
  rpc StreamGame(StreamGameRequest) returns (stream GameDataResponse);

  // アクション送信（個別の単方向RPC）
  rpc ApplyMove(PlayerAction) returns (GameDataResponse);
  rpc ApplyAttack(PlayerAction) returns (GameDataResponse);
  rpc EndTurn(PlayerAction) returns (GameDataResponse);
  rpc ApplyGridUpdate(PlayerAction) returns (GameDataResponse);
}

// 試合登録用リクエスト
message CreateGameRequest {
  uint32 room_id = 1;
  string player1_id = 2;
  string player2_id = 3;
}

message StreamGameRequest {
  uint32 room_id = 1;
  string player_id = 2;
}

// プレイヤーのアクション（移動など）
message PlayerAction {
  uint32 room_id = 1;
  string player_id = 2;
  oneof action {
    MoveAction move = 3;
    bool end_turn = 4;
    AttackAction attack = 5;
    GridUpdateAction grid_update = 6;
  }
}

message GridUpdateAction {
  repeated GridInfo grids = 1;
}

message MoveAction {
  uint32 character_unique_id = 1;
  uint32 to_x = 2;
  uint32 to_y = 3;
}

message AttackAction {
  uint32 attacker_character_unique_id = 1;
  int32 attack_type = 2; // 0..3
  bool is_started = 3;
  uint32 base_hp1 = 4;
  uint32 base_hp2 = 5;
  uint32 attacked_character_unique_id = 6; // 攻撃対象キャラのユニークID
  uint32 new_hp = 7;                        // フロント計算済みの攻撃後HP
}

// 試合情報全体のレスポンス
message GameDataResponse {
  uint32 id = 1;
  uint32 room_id = 2;
  string player1_id = 3;
  string player2_id = 4;
  uint32 base_hp1 = 5;
  uint32 base_hp2 = 6;
  uint32 turn = 7;
  bool is_1p_turn = 8;
  google.protobuf.Timestamp turn_start_at = 9;
  repeated UniqueCharacter characters = 10;
  bool is_finished = 11;
  string winner_player_id = 12;
  google.protobuf.Timestamp finished_at = 13;
  repeated AttackInfo attack_infos = 14;
  repeated GridInfo grids = 15;
  uint32 cost_1p = 16;
  uint32 cost_2p = 17;
}

message GridInfo {
  uint32 position_x = 1;
  uint32 position_y = 2;
  int32 grid_type = 3;
}

message UniqueCharacter {
  uint32 id = 1;
  uint32 character_id = 2;
  bool is_1p = 3;
  uint32 hp = 4;
  uint32 position_x = 5;
  uint32 position_y = 6;
  repeated CharacterCondition conditions = 7;
  bool is_selected = 8;
}

message CharacterCondition {
  uint32 id = 1;
  int32 condition_id = 2;
  int32 lasting_turn = 3;
}

message AttackInfo {
  uint32 id = 1;
  uint32 room_id = 2;
  int32 attacker_side = 3;
  bool is_started = 4;
  uint32 attacker_character_id = 5;
  int32 attack_type = 6;
  google.protobuf.Timestamp attacked_at = 7;
}

message GetGameDataRequest {
  uint32 room_id = 1;
}

message RegisterCharactersRequest {
  uint32 room_id = 1;
  bool is_1p = 2;
  repeated uint32 character_ids = 3; // 選んだ3体のマスターID
}

message RegisterCharactersResponse {
  repeated UniqueCharacter registered_characters = 1;
}