syntax = "proto3";

package room;

option go_package = "auxilia/pb";

service RoomService {
    rpc JoinRoom (JoinRoomRequest) returns (JoinRoomResponse);

    rpc LeaveRoom (LeaveRoomRequest) returns (LeaveRoomResponse);

    rpc ListRoom (ListRoomRequest) returns (ListRoomResponse);

    rpc EnterRing (EnterRingRequest) returns (EnterRingResponse);

    rpc LeaveRing (LeaveRingRequest) returns (LeaveRingResponse);

    rpc SetReady (SetReadyRequest) returns (SetReadyResponse);

    rpc UpdateRoomState (UpdateRoomStateRequest) returns (UpdateRoomStateResponse);

    rpc StartMatch (StartMatchRequest) returns (StartMatchResponse);

    // ルーム内のリアルタイム同期（入室時のStream接続用）
    rpc StreamRoom (RoomStreamRequest) returns (stream ListRoomResponse);
}

message RoomStreamRequest {
    int32 room_id = 1;
    string user_id = 2;
}

message Room {
    int32 room_id = 1;
    string user_id = 2;
    int32 state = 3;
    bool is_ready = 4;
    string joined_at = 5;
}

message JoinRoomRequest {
    int32 room_id = 1;
    string user_id = 2;
}

message JoinRoomResponse {
    repeated Room rooms = 1;
}

message LeaveRoomRequest {
    int32 room_id = 1;
    string user_id = 2;
}

message LeaveRoomResponse {
    repeated Room rooms = 1;
}

message ListRoomRequest {
    int32 room_id = 1;
}

message ListRoomResponse {
    repeated Room rooms = 1;
}

message EnterRingRequest {
    int32 room_id = 1;
    string user_id = 2;
}

message EnterRingResponse {
    repeated Room rooms = 1;
}

message LeaveRingRequest {
    int32 room_id = 1;
    string user_id = 2;
}

message LeaveRingResponse {
    repeated Room rooms = 1;
}

message SetReadyRequest {
    int32 room_id = 1;
    string user_id = 2;
    bool ready = 3;
}

message SetReadyResponse {
    repeated Room rooms = 1;
}

message UpdateRoomStateRequest {
    int32 room_id = 1;
    string user_id = 2;
    int32 state = 3;     // 0=観戦, 1=1P, 2=2P
    bool is_ready = 4;
}

message UpdateRoomStateResponse {
    repeated Room rooms = 1;
}

message StartMatchRequest {
    int32 room_id = 1;
}

message StartMatchResponse {
    repeated Room rooms = 1;
    bool started = 2;
}
